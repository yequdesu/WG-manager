name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      - name: make build
        run: make build

      - name: cargo check
        run: cargo check --manifest-path wg-tui/Cargo.toml

      - name: cargo test
        run: cargo test --manifest-path wg-tui/Cargo.toml

  integration-test:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: amiller68/wireguard-ci@v1
      - name: Build daemon
        run: make build
      - name: Run integration tests
        run: sudo bash testdata/run-wsl-test.sh
